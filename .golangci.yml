run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - bodyclose
    - nilerr
    - prealloc
  settings:
    revive:
      severity: warning
      rules:
        - name: exported
          arguments: ["disableStutteringCheck"]
    prealloc:
      simple: true
      range-loops: true
      for-loops: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
  exclude-rules:
    - path: _test\.go
      linters: [prealloc, govet]
