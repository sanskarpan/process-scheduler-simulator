version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - bodyclose
    - nilerr
    - prealloc
  settings:
    revive:
      severity: warning
      rules:
        - name: exported
          disabled: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
  exclusions:
    paths:
      - _test\.go
    linters:
      - prealloc
      - govet

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
