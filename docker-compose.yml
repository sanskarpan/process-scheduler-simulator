services:
  server:
    build: .
    image: scheduler-simulator:latest
    ports:
      - "${PORT:-8082}:8082"
    environment:
      PORT: "8082"
      STATIC_DIR: "/app/web/static"
      LOG_LEVEL: "info"
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    healthcheck:
      # Use the binary's built-in --health flag (distroless has no wget/curl).
      test: ["/app/server", "--health"]
      interval: 15s
      timeout: 5s
      start_period: 5s
      retries: 3
